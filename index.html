<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="login-card">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="https://img.freepik.com/free-vector/mobile-login-concept-illustration_114360-83.jpg" alt="Login Image">
    </div>

    <!-- RIGHT FORM -->
    <div class="right">
        <h2>Login</h2>

        <input type="text" placeholder="yourmail@gmail.com">
        <input type="password" placeholder="********">

        <button onclick="window.location.href='dashboard.html'">
            Sign in
        </button>

        <p class="link">Forgot password?</p>
    </div>

</div>

</body>
</html>
